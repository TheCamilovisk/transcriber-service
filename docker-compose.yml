services:
  migrate:
    build: .
    env_file:
      - .env
    volumes:
      - .:/app
      - ./data:/app/data
    command: uv run alembic upgrade head
    restart: "no"

  api:
    build: .
    env_file:
      - .env
    volumes:
      - .:/app
      - ./data:/app/data
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - 8000:8000
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build: .
    env_file:
      - .env
    volumes:
      - .:/app
      - ./data:/app/data
    command: uv run python -m app.worker.main
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
